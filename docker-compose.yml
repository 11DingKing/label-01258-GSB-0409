version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exam-backend
    ports:
      - "8080:8080"
    volumes:
      - exam-data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/auth/info || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: exam-frontend-admin
    ports:
      - "8081:80"
    depends_on:
      - backend
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

volumes:
  exam-data:
    driver: local
